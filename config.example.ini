[proton]
# Proton Bridge listens on localhost by default.
host     = 127.0.0.1
port     = 1143
ssl      = false
# Use your full Proton Mail address and the Bridge-specific password
# (not your Proton account password — find it in the Bridge app).
username = you@proton.me
password = your-bridge-password

[gmail]
username     = you@gmail.com
# Generate an App Password at https://myaccount.google.com/apppasswords
# (requires 2-Step Verification to be enabled on your Google account).
app_password = xxxx-xxxx-xxxx-xxxx

[options]
# Number of messages fetched from Proton per IMAP request.
# Lower this if you hit memory or timeout errors.
batch_size = 25

# Seconds to wait between Gmail APPEND calls.
# Increase to 0.5–1.0 if Gmail starts returning rate-limit errors.
append_delay_seconds = 0.1
